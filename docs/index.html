                <p class="mt-1 text-[10px] leading-4 text-slate-500">建立補收/退費紀錄，不會直接更改舊繳費單。</p>
              </div>

              <div class="grid grid-cols-2 gap-2">
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">類型</span>
                  <select class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.type">
                    <option value="補收">補收</option>
                    <option value="退費">退費</option>
                  </select>
                </label>
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">原錯誤月份</span>
                  <input type="month" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.originalMonth" @change="refreshAdjustmentDocIds()">
                </label>
              </div>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">處理月份</span>
                <input type="month" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.processingMonth">
              </label>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">學生姓名</span>
                <select class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.student" @change="onAdjustmentStudentChange()">
                  <option value="">-- 請選擇學生 --</option>
                  <template x-for="student in adjustmentOptions.students" :key="student">
                    <option :value="student" x-text="student"></option>
                  </template>
                </select>
              </label>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">課程名稱</span>
                <select class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.course" @change="onAdjustmentCourseChange()">
                  <option value="">-- 請選擇課程 --</option>
                  <template x-for="course in adjustmentCourses()" :key="course.name + '-' + course.unitFee">
                    <option :value="course.name" x-text="course.name + ' / ' + course.mode + ' / $' + course.unitFee"></option>
                  </template>
                </select>
              </label>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">原上課日期</span>
                <input type="date" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.lessonDate">
              </label>

              <div class="grid grid-cols-2 gap-2">
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">開始</span>
                  <input type="time" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.startTime" @change="recalculateAdjustmentHours()">
                </label>
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">結束</span>
                  <input type="time" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.endTime" @change="recalculateAdjustmentHours()">
                </label>
              </div>

              <div class="grid grid-cols-2 gap-2">
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">時數</span>
                  <input type="number" step="0.5" min="0" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.hours" readonly>
                </label>
                <label class="block">
                  <span class="text-xs font-semibold text-slate-400">單價</span>
                  <input type="number" step="1" min="0" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.unitFee" readonly>
                </label>
              </div>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">關聯原單號</span>
                <select class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model="adjustmentForm.relatedDocId">
                  <option value="">-- 請選擇或確認原單號 --</option>
                  <template x-for="docId in adjustmentOptions.docIds" :key="docId">
                    <option :value="docId" x-text="docId"></option>
                  </template>
                </select>
                <p class="mt-2 text-xs text-amber-300" x-show="adjustmentForm.student && adjustmentForm.originalMonth && adjustmentOptions.docIds.length === 0">找不到該學生該月份的原單號，請先確認月份或結算資料。</p>
              </label>

              <div class="rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-xs text-slate-300">
                <p>預覽金額：<span class="font-bold text-amber-300" x-text="adjustmentPreviewAmount()"></span></p>
              </div>

              <label class="block">
                <span class="text-xs font-semibold text-slate-400">原因</span>
                <textarea rows="2" class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-3 py-2.5 text-sm text-white outline-none transition focus:border-amber-500" x-model.trim="adjustmentForm.reason" placeholder="例如：講師漏登，家長回覆後補救"></textarea>
              </label>

              <button
                type="button"
                class="w-full rounded-xl bg-amber-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-amber-900/30 hover:bg-amber-500 disabled:bg-slate-800 disabled:text-slate-500 transition"
                :disabled="submitting || !adjustmentForm.student || !adjustmentForm.course || !adjustmentForm.relatedDocId || !adjustmentForm.unitFee"
                @click="submitTuitionAdjustment()"
              >
                建立補救紀錄
              </button>
            </div>
            </div>
          </div>
        </section>

        <!-- 摰?餃?圾?斤?摰?-->
        <div class="px-4">
          <button
            type="button"
            class="w-full rounded-xl border border-slate-850 hover:border-red-500/30 hover:bg-red-500/5 py-2.5 text-xs text-slate-500 hover:text-red-400 transition"
            @click="unbind()"
          >
            閫? LINE 撣唾?蝬?
          </button>
        </div>
      </section>
    </main>

    <script>
      function kongApp() {
        return {
          config: window.APP_CONFIG || {},
          state: "loading",
          message: "",
          submitting: false,
          lineUserId: "",
          profile: null, // LINE Profile
          teacherProfile: null, // Google Sheets 雓葦鞈?
          activeTab: "register",
          adminMonth: new Date().toISOString().substring(0, 7), // YYYY-MM
          options: {
            students: [],
            subjects: [],
            coursesByStudent: {},
          },
          adjustmentOptions: {
            students: [],
            coursesByStudent: {},
            docIds: [],
          },
          optionsLoaded: false,
          unverifiedSchedules: [],
          form: {
            name: "",
          },
          regForm: {
            mode: "normal", // 'normal' | 'pre'
            student: "",
            subject: "",
            date: new Date().toISOString().substring(0, 10),
            startTime: "13:00",
            endTime: "14:00",
          },
          leaveForm: {
            type: "鈭?",
            date: new Date().toISOString().substring(0, 10),
            startTime: "09:00",
            endTime: "10:00",
          },
          adjustmentForm: {
            type: "補收",
            originalMonth: new Date().toISOString().substring(0, 7),
            processingMonth: new Date().toISOString().substring(0, 7),
            student: "",
            course: "",
            lessonDate: new Date().toISOString().substring(0, 10),
            startTime: "14:00",
            endTime: "15:30",
            hours: "1.5",
            unitFee: "",
            relatedDocId: "",
            reason: "",
          },

          async init() {
            try {
              this.ensureConfig();
              await this.initLiff();
              await this.loadMe();
              if (this.state === "bound") {
                await this.loadOptions();
                await this.loadTuitionAdjustmentOptions();
                await this.loadUnverifiedSchedules();
              }
            } catch (error) {
              this.state = "unbound";
              this.message = error.message || "初始化失敗，請在 LINE 聊天室內重新開啟。";
            }
          },

          ensureConfig() {
            if (!this.config.gasWebAppUrl) {
              // 皜祈岫?挾?? friendly fallback 隤芣?
              console.warn("GAS URL 未設定，使用模擬模式。");
            }
          },

          async initLiff() {
            if (!window.liff) {
              throw new Error("LINE LIFF SDK 載入失敗。");
            }
            if (this.config.liffId) {
              await liff.init({ liffId: this.config.liffId });
              if (!liff.isLoggedIn()) {
                liff.login();
                return;
              }
              const profile = await liff.getProfile();
              this.profile = profile;
              this.lineUserId = profile.userId;
            } else {
              // ?砍璅⊥
              this.lineUserId = "U_MOCK_USER_ID";
              this.profile = {
                displayName: "?璅⊥雓葦",
                pictureUrl: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=facearea&facepad=2&w=256&h=256&q=80",
              };
            }
          },

          async loadMe() {
            if (!this.config.gasWebAppUrl) {
              this.teacherProfile = {
                name: "開發模擬講師",
                thisMonthHours: 12,
                casualLeaveRemaining: 8,
                sickLeaveRemaining: 24,
                isAdmin: true,
              };
              this.state = "bound";
              return;
            }

            const result = await this.callApi({
              action: "me",
              lineUserId: this.lineUserId,
            });

            if (result.ok) {
              this.teacherProfile = result.profile;
              this.state = "bound";
              this.message = "";
            } else if (result.error === "NOT_BOUND") {
              this.state = "unbound";
              this.message = "";
            } else {
              throw new Error(result.message || "讀取講師資料失敗。");
            }
          },

          async loadOptions() {
            if (!this.config.gasWebAppUrl) {
              this.options = {
                students: ["張學友", "劉德華", "郭富城", "黎明"],
                subjects: ["英語會話", "初級日語", "重訓指導", "瑜伽基礎"],
                coursesByStudent: {
                  張學友: ["英語會話", "初級日語"],
                  劉德華: ["重訓指導"],
                  郭富城: ["瑜伽基礎"],
                  黎明: ["英語會話"],
                },
              };
              this.optionsLoaded = true;
              return;
            }
            const result = await this.callApi({
              action: "getFormOptions",
              lineUserId: this.lineUserId,
            });
            if (result.ok) {
              this.options = result.options || { students: [], subjects: [], coursesByStudent: {} };
              this.optionsLoaded = true;
              if (result.message) {
                this.message = result.message;
              }
            } else {
              this.optionsLoaded = true;
              throw new Error(result.message || "載入學生與課程選項失敗。");
            }
          },

          filteredSubjects() {
            const selectedStudent = this.regForm.student;
            if (!selectedStudent) return [];
            const coursesByStudent = this.options.coursesByStudent || {};
            return coursesByStudent[selectedStudent] || [];
          },

          async loadTuitionAdjustmentOptions() {
            if (!this.config.gasWebAppUrl || !this.teacherProfile?.isAdmin) {
              return;
            }
            const result = await this.callApi({
              action: "tuitionAdjustmentOptions",
              lineUserId: this.lineUserId,
              originalMonth: this.adjustmentForm.originalMonth.replace("-", "/"),
              student: this.adjustmentForm.student,
            });
            if (result.ok) {
              this.adjustmentOptions = result.options || { students: [], coursesByStudent: {}, docIds: [] };
              if (this.adjustmentOptions.docIds.length === 1) {
                this.adjustmentForm.relatedDocId = this.adjustmentOptions.docIds[0];
              }
            }
          },

          adjustmentCourses() {
            const selectedStudent = this.adjustmentForm.student;
            if (!selectedStudent) return [];
            const coursesByStudent = this.adjustmentOptions.coursesByStudent || {};
            return coursesByStudent[selectedStudent] || [];
          },

          async onAdjustmentStudentChange() {
            this.adjustmentForm.course = "";
            this.adjustmentForm.unitFee = "";
            this.adjustmentForm.relatedDocId = "";
            await this.refreshAdjustmentDocIds();
          },

          onAdjustmentCourseChange() {
            const selectedCourse = this.adjustmentCourses().find(course => course.name === this.adjustmentForm.course);
            this.adjustmentForm.unitFee = selectedCourse ? selectedCourse.unitFee : "";
            this.recalculateAdjustmentHours();
          },

          async refreshAdjustmentDocIds() {
            if (!this.adjustmentForm.student || !this.adjustmentForm.originalMonth) return;
            await this.loadTuitionAdjustmentOptions();
          },

          recalculateAdjustmentHours() {
            if (!this.adjustmentForm.startTime || !this.adjustmentForm.endTime) return;
            const start = this.parseClockTime(this.adjustmentForm.startTime);
            const end = this.parseClockTime(this.adjustmentForm.endTime);
            if (end > start) {
              this.adjustmentForm.hours = String(Math.round((end - start) * 100) / 100);
            }
          },

          parseClockTime(value) {
            const clean = String(value || "").replace(":", "");
            if (clean.length !== 4) return 0;
            return Number(clean.substring(0, 2)) + Number(clean.substring(2, 4)) / 60;
          },

          adjustmentPreviewAmount() {
            const amount = Math.round(Number(this.adjustmentForm.hours || 0) * Number(this.adjustmentForm.unitFee || 0));
            const signedAmount = this.adjustmentForm.type === "退費" ? -amount : amount;
            return Number.isFinite(signedAmount) ? signedAmount : 0;
          },

          async loadUnverifiedSchedules() {
            if (!this.config.gasWebAppUrl) {
              this.unverifiedSchedules = [
                { rowId: 101, student: "張學友", subject: "英語會話", date: "2026-05-30", startTime: "14:00", endTime: "15:30", hours: 1.5, canVerify: true },
                { rowId: 102, student: "劉德華", subject: "初級日語", date: "2026-06-30", startTime: "10:00", endTime: "12:00", hours: 2.0, canVerify: false, verifyMessage: "課程尚未結束，暫不可核銷。" },
              ];
              return;
            }
            const result = await this.callApi({
              action: "getUnverified",
              lineUserId: this.lineUserId,
            });
            if (result.ok) {
              this.unverifiedSchedules = result.schedules;
            }
          },

          async verifyAndBind() {
            this.message = "";
            this.submitting = true;
            try {
              if (!this.config.gasWebAppUrl) {
                this.teacherProfile = {
                  name: this.form.name,
                  thisMonthHours: 0,
                  casualLeaveRemaining: 8,
                  sickLeaveRemaining: 24,
                  isAdmin: this.form.name.includes("銵"),
                };
                this.state = "bound";
                await this.loadOptions();
                await this.loadTuitionAdjustmentOptions();
                await this.loadUnverifiedSchedules();
                return;
              }

              const result = await this.callApi({
                action: "verifyAndBind",
                name: this.form.name,
                lineUserId: this.lineUserId,
              });

              if (result.ok) {
                this.teacherProfile = result.profile;
                this.state = "bound";
                await this.loadOptions();
                await this.loadTuitionAdjustmentOptions();
                await this.loadUnverifiedSchedules();
              } else {
                throw new Error(result.message || "身分驗證失敗，請聯絡管理員確認講師名單。");
              }
            } catch (error) {
              this.message = error.message;
            } finally {
              this.submitting = false;
            }
          },

          async registerCourse() {
            this.message = "";
            this.submitting = true;
            try {
              if (this.regForm.endTime <= this.regForm.startTime) {
                throw new Error("上課結束時間必須晚於開始時間。");
              }
              if (!this.config.gasWebAppUrl) {
                alert(`模擬送出：${this.regForm.mode === "normal" ? "正式授課" : "預排登記"}\n學生：${this.regForm.student}\n課程：${this.regForm.subject}\n日期：${this.regForm.date}`);
                this.submitting = false;
                return;
              }

              const result = await this.callApi({
                action: "register",
                lineUserId: this.lineUserId,
                mode: this.regForm.mode,
                student: this.regForm.student,
                subject: this.regForm.subject,
                date: this.regForm.date,
                startTime: this.regForm.startTime,
                endTime: this.regForm.endTime,
              });

              if (result.ok) {
                alert("登記成功！");
                await this.loadMe(); // ?湔?
                this.activeTab = "register";
              } else {
                throw new Error(result.message || "登記失敗，請重新確認。");
              }
            } catch (error) {
              this.message = error.message;
              alert(error.message);
            } finally {
              this.submitting = false;
            }
          },

          async verifySchedule(rowId, isVerified) {
            if (!this.config.gasWebAppUrl) {
              this.unverifiedSchedules = this.unverifiedSchedules.filter(item => item.rowId !== rowId);
              alert(`模擬核銷：第 ${rowId} 筆，狀態：${isVerified === "yes" ? "已實際上課" : "取消未上課"}`);
              return;
            }

            try {
              const result = await this.callApi({
                action: "verifySchedule",
                lineUserId: this.lineUserId,
                rowId: rowId,
                isVerified: isVerified,
              });

              if (result.ok) {
                await this.loadUnverifiedSchedules();
                await this.loadMe();
                alert("核銷成功！");
              } else {
                throw new Error(result.message || "核銷更新失敗。");
              }
            } catch (error) {
              this.message = error.message;
              alert(error.message);
              await this.loadUnverifiedSchedules();
            }
          },

          async submitLeave() {
            this.message = "";
            this.submitting = true;
            try {
              if (this.leaveForm.endTime <= this.leaveForm.startTime) {
                throw new Error("請假結束時間必須晚於開始時間。");
              }
              if (!this.config.gasWebAppUrl) {
                alert(`模擬請假：${this.leaveForm.type}\n日期：${this.leaveForm.date}\n時間：${this.leaveForm.startTime} - ${this.leaveForm.endTime}`);
                this.submitting = false;
                return;
              }

              const result = await this.callApi({
                action: "leave",
                lineUserId: this.lineUserId,
                type: this.leaveForm.type,
                date: this.leaveForm.date,
                startTime: this.leaveForm.startTime,
                endTime: this.leaveForm.endTime,
              });

              if (result.ok) {
                alert("請假申請已送出。");
                await this.loadMe(); // ?湔?擗?
              } else {
                throw new Error(result.message || "請假申請失敗，請確認時間是否重複。");
              }
            } catch (error) {
              this.message = error.message;
              alert(error.message);
            } finally {
              this.submitting = false;
            }
          },

          async runAdminTask(taskName) {
            const formattedMonth = this.adminMonth.replace("-", "/"); // e.g., '2026/05'
            if (!this.config.gasWebAppUrl) {
              alert(`模擬行政任務：${taskName}\n月份：${formattedMonth}`);
              return;
            }

            if (!confirm(`確定執行 ${formattedMonth} 的「${taskName}」？`)) {
              return;
            }

            try {
              // ??璅⊥?澆敺垢鞎∪?/?格?憭折?
              const result = await this.callApi({
                action: "adminTask",
                lineUserId: this.lineUserId,
                task: taskName,
                month: formattedMonth,
              });

              if (result.ok) {
                alert(`${taskName} 執行完成。\n${result.message || ""}`);
              } else {
                throw new Error(result.message || "行政任務執行失敗。");
              }
            } catch (error) {
              alert(error.message);
            }
          },

          async submitTuitionAdjustment() {
            this.message = "";
            this.submitting = true;
            try {
              if (this.adjustmentForm.endTime <= this.adjustmentForm.startTime) {
                throw new Error("結束時間必須晚於開始時間。");
              }
              const amount = Math.round(Number(this.adjustmentForm.hours || 0) * Number(this.adjustmentForm.unitFee || 0));
              if (!amount || amount <= 0) {
                throw new Error("時數與單價必須大於 0。");
              }
              const signedAmount = this.adjustmentForm.type === "退費" ? -amount : amount;
              const confirmed = confirm(
                `建立${this.adjustmentForm.type}紀錄？\n` +
                `學生：${this.adjustmentForm.student}\n` +
                `課程：${this.adjustmentForm.course}\n` +
                `原錯誤月份：${this.adjustmentForm.originalMonth.replace("-", "/")}\n` +
                `處理月份：${this.adjustmentForm.processingMonth.replace("-", "/")}\n` +
                `金額：${signedAmount}\n\n` +
                "此操作只會建立調整紀錄，不會直接更改舊繳費單。"
              );
              if (!confirmed) return;

              if (!this.config.gasWebAppUrl) {
                alert("模擬建立帳務補救紀錄。");
                return;
              }

              const result = await this.callApi({
                action: "tuitionAdjustment",
                lineUserId: this.lineUserId,
                adjustmentType: this.adjustmentForm.type,
                originalMonth: this.adjustmentForm.originalMonth.replace("-", "/"),
                processingMonth: this.adjustmentForm.processingMonth.replace("-", "/"),
                student: this.adjustmentForm.student,
                course: this.adjustmentForm.course,
                lessonDate: this.adjustmentForm.lessonDate,
                startTime: this.adjustmentForm.startTime,
                endTime: this.adjustmentForm.endTime,
                hours: this.adjustmentForm.hours,
                unitFee: this.adjustmentForm.unitFee,
                relatedDocId: this.adjustmentForm.relatedDocId,
                reason: this.adjustmentForm.reason,
              });

              if (result.ok) {
                alert(result.message || "已建立帳務補救紀錄。");
                this.adjustmentForm.student = "";
                this.adjustmentForm.course = "";
                this.adjustmentForm.unitFee = "";
                this.adjustmentForm.relatedDocId = "";
                this.adjustmentForm.reason = "";
                this.adjustmentOptions.docIds = [];
              } else {
                throw new Error(result.message || "建立帳務補救紀錄失敗。");
              }
            } catch (error) {
              this.message = error.message;
              alert(error.message);
            } finally {
              this.submitting = false;
            }
          },

          async unbind() {
            if (!confirm("確定要解除此 LINE 帳號的講師綁定嗎？")) {
              return;
            }
            try {
              if (this.config.gasWebAppUrl) {
                await this.callApi({
                  action: "unbind",
                  lineUserId: this.lineUserId,
                });
              }
              this.teacherProfile = null;
              this.state = "unbound";
              alert("已解除綁定。");
            } catch (error) {
              alert("解除綁定失敗，請稍後再試。");
            }
          },

          async callApi(params) {
            const url = new URL(this.config.gasWebAppUrl);
            Object.entries(params).forEach(([key, value]) => {
              if (value !== undefined && value !== null && value !== "") {
                url.searchParams.set(key, value);
              }
            });

            const response = await fetch(url.toString(), {
              method: "GET",
              redirect: "follow",
            });
            const responseText = await response.text();
            if (!response.ok) {
              throw new Error(`API HTTP ${response.status}: ${responseText.substring(0, 240)}`);
            }
            try {
              return JSON.parse(responseText);
            } catch (error) {
              throw new Error(`API ??銝 JSON: ${responseText.substring(0, 240)}`);
            }
          },
        };
      }
    </script>
  </body>
</html>
